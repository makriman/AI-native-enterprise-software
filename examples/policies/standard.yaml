profile: standard
rules:
  - id: upstream_edit_requires_elevation
    action: block
  - id: wildcard_acl_grant
    action: escalate
  - id: superuser_id_usage
    action: escalate
  - id: destructive_sql
    action: block
  - id: outbound_http_requires_allowlist
    action: escalate
  - id: cron_without_coverage
    action: warn
