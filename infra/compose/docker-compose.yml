name: odoo-ai-edition

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - ai-console
      - control-api
    ports:
      - "8080:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  ai-console:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh -lc "corepack enable && pnpm install && pnpm --filter @oae/ai-console dev"
    environment:
      CONTROL_API_URL: http://control-api:4000
      NEXT_PUBLIC_CONTROL_API_URL: http://localhost:4000
    volumes:
      - ../../:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - control-api

  control-api:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh -lc "corepack enable && pnpm install && pnpm --filter @oae/control-api dev"
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      REPO_ROOT: /workspace
      ARTIFACT_ROOT: /workspace/artifacts
      STATE_STORE_PATH: /workspace/artifacts/control-api-state.json
      POLICY_PROFILE_DEFAULT: standard
      DATABASE_URL: postgresql://${CONTROLPLANE_DB_USER}:${CONTROLPLANE_DB_PASSWORD}@controlplane-db:5432/${CONTROLPLANE_DB_NAME}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ../../:/workspace
    ports:
      - "4000:4000"
    depends_on:
      - controlplane-db
      - redis
      - minio

  runner-supervisor:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh -lc "corepack enable && pnpm install && pnpm --filter @oae/runner-supervisor dev"
    environment:
      PORT: 4100
      HOST: 0.0.0.0
      RUNNER_WORKDIR_ROOT: /workspace/.runner-workspaces
    volumes:
      - ../../:/workspace
    ports:
      - "4100:4100"

  log-gateway:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh -lc "corepack enable && pnpm install && pnpm --filter @oae/log-gateway dev"
    environment:
      PORT: 4300
      HOST: 0.0.0.0
    volumes:
      - ../../:/workspace
    ports:
      - "4300:4300"

  edge-agent:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh -lc "corepack enable && pnpm install && pnpm --filter @oae/edge-agent dev"
    environment:
      CONTROL_API_URL: http://control-api:4000
      WORKSPACE_ID: ws_default
      AGENT_NAME: compose-edge-agent
      AGENT_TOKEN: ${EDGE_AGENT_TOKEN}
      POLL_INTERVAL_MS: 8000
      EDGE_AGENT_WORKROOT: /workspace/.edge-agent
    volumes:
      - ../../:/workspace
    profiles:
      - edge
    depends_on:
      - control-api

  controlplane-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CONTROLPLANE_DB_USER}
      POSTGRES_PASSWORD: ${CONTROLPLANE_DB_PASSWORD}
      POSTGRES_DB: ${CONTROLPLANE_DB_NAME}
    volumes:
      - controlplane-postgres-data:/var/lib/postgresql/data
      - ./controlplane-db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5434:5432"

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  odoo-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ODOO_DB_USER}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - odoo-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  odoo:
    image: odoo:19.0
    restart: unless-stopped
    depends_on:
      - odoo-db
    environment:
      HOST: odoo-db
      PORT: 5432
      USER: ${ODOO_DB_USER}
      PASSWORD: ${ODOO_DB_PASSWORD}
      ODOO_DB_USER: ${ODOO_DB_USER}
      ODOO_DB_PASSWORD: ${ODOO_DB_PASSWORD}
      ODOO_ADMIN_PASSWORD: ${ODOO_ADMIN_PASSWORD}
    command: >-
      sh -lc "cp /etc/odoo/odoo.conf /tmp/odoo-runtime.conf
      && printf '\\nadmin_passwd = %s\\n' \"$$ODOO_ADMIN_PASSWORD\" >> /tmp/odoo-runtime.conf
      && odoo --config=/tmp/odoo-runtime.conf
      --db_host=odoo-db --db_port=5432 --db_user=$$ODOO_DB_USER
      --db_password=$$ODOO_DB_PASSWORD"
    volumes:
      - ./odoo-config/odoo.conf:/etc/odoo/odoo.conf:ro
      - odoo-filestore:/var/lib/odoo
      - ../../addons/bridge:/mnt/extra-addons/bridge
      - ../../addons/generated:/mnt/extra-addons/generated
      - ../../addons/custom:/mnt/extra-addons/custom
      - ../../addons/test_support:/mnt/extra-addons/test_support
      - ../../upstream/odoo-community:/opt/odoo-community
    ports:
      - "8069:8069"

volumes:
  controlplane-postgres-data:
  odoo-postgres-data:
  odoo-filestore:
  redis-data:
  minio-data:
