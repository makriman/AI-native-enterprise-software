version: "3.9"

name: aircrm

services:
  ai-console:
    build:
      context: ../../
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        APP_PACKAGE: "@oae/ai-console"
    restart: unless-stopped
    environment:
      CONTROL_API_URL: http://control-api:4000
      NEXT_PUBLIC_CONTROL_API_URL: ""
    depends_on:
      - control-api
    ports:
      - "127.0.0.1:${AIRCRM_CONSOLE_PORT}:3000"

  control-api:
    build:
      context: ../../
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        APP_PACKAGE: "@oae/control-api"
    restart: unless-stopped
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      REPO_ROOT: /workspace
      ARTIFACT_ROOT: /workspace/artifacts
      POLICY_PROFILE_DEFAULT: standard
      DATABASE_URL: postgresql://${CONTROLPLANE_DB_USER}:${CONTROLPLANE_DB_PASSWORD}@controlplane-db:5432/${CONTROLPLANE_DB_NAME}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      - controlplane-db
      - redis
      - minio
    ports:
      - "127.0.0.1:${AIRCRM_API_PORT}:4000"

  controlplane-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CONTROLPLANE_DB_USER}
      POSTGRES_PASSWORD: ${CONTROLPLANE_DB_PASSWORD}
      POSTGRES_DB: ${CONTROLPLANE_DB_NAME}
    volumes:
      - controlplane-postgres-data:/var/lib/postgresql/data
      - ./controlplane-db-init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:${AIRCRM_MINIO_API_PORT}:9000"
      - "127.0.0.1:${AIRCRM_MINIO_CONSOLE_PORT}:9001"

  odoo-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ODOO_DB_USER}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - odoo-postgres-data:/var/lib/postgresql/data

  odoo:
    image: odoo:19.0
    restart: unless-stopped
    depends_on:
      - odoo-db
    environment:
      HOST: odoo-db
      USER: ${ODOO_DB_USER}
      PASSWORD: ${ODOO_DB_PASSWORD}
    command: >-
      sh -lc "odoo --config=/etc/odoo/odoo.conf
      --db_host=odoo-db --db_port=5432 --db_user=$$ODOO_DB_USER
      --db_password=$$ODOO_DB_PASSWORD --admin_passwd=$$ODOO_ADMIN_PASSWORD"
    volumes:
      - ./odoo-config/odoo.conf:/etc/odoo/odoo.conf:ro
      - odoo-filestore:/var/lib/odoo
      - ../../addons/bridge:/mnt/extra-addons/bridge
      - ../../addons/generated:/mnt/extra-addons/generated
      - ../../addons/custom:/mnt/extra-addons/custom
      - ../../addons/test_support:/mnt/extra-addons/test_support
      - ../../upstream/odoo-community:/opt/odoo-community
    ports:
      - "127.0.0.1:${AIRCRM_ODOO_PORT}:8069"

volumes:
  controlplane-postgres-data:
  odoo-postgres-data:
  odoo-filestore:
  redis-data:
  minio-data:
